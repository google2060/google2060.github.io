<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Spark TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" media="print" onload="this.media='all'"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<style>
/* ─── TOKENS ─── */
:root{
  --spark:#ff4d00;--spark2:#ff7b2e;--sg:rgba(255,77,0,.2);
  --accent:#00c8ff;--gold:#f5c842;
  --bg:#080b14;--bg2:#10141f;--bg3:#181d2d;
  --card:#141926;--card2:#1c2236;--card3:#232c42;
  --b1:rgba(255,77,0,.18);--b2:rgba(255,255,255,.07);
  --t1:#eef1fc;--t2:#8e9abf;--mt:#4a5278;--mt2:#222840;
  --green:#00e676;--red:#ff3d3d;--sh:rgba(0,0,0,.7);
  --nh:64px;--th:50px;--r:14px;
}
[data-theme="light"]{
  --bg:#f2f4fb;--bg2:#e6eaf6;--bg3:#d9dfee;
  --card:#fff;--card2:#f4f6fb;--card3:#eaecf6;
  --b1:rgba(255,77,0,.2);--b2:rgba(0,0,0,.07);
  --t1:#0d0f1a;--t2:#3a4060;--mt:#8a94b8;--mt2:#d0d4e8;--sh:rgba(0,0,30,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;font-size:15px;line-height:1.55;-webkit-overflow-scrolling:touch;}
h1,h2,h3,.brand-name{font-family:'Syne',sans-serif;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--mt2);border-radius:2px;}

/* ─── NAV ─── */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:300;height:var(--nh);
  background:rgba(8,11,20,.94);border-bottom:1px solid var(--b2);
  display:flex;align-items:center;padding:0 20px;gap:12px;
  backdrop-filter:blur(20px);contain:layout style;
}
[data-theme="light"] .topnav{background:rgba(242,244,251,.95);}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none;}
.brand-icon{
  width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:linear-gradient(135deg,var(--spark),var(--spark2));
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;
  box-shadow:0 4px 16px var(--sg);
}
.brand-name{
  font-size:20px;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(135deg,var(--spark),var(--spark2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.nav-sp{flex:1;}
.nav-srch{position:relative;display:flex;align-items:center;}
.nav-srch input{
  background:var(--card2);border:1px solid var(--b2);border-radius:26px;
  padding:8px 34px 8px 36px;font-family:'Nunito',sans-serif;font-size:13px;
  color:var(--t1);outline:none;width:200px;transition:width .22s,border-color .2s,box-shadow .2s;
}
.nav-srch input:focus{border-color:var(--spark);width:260px;box-shadow:0 0 0 3px var(--sg);}
.nav-srch input::placeholder{color:var(--mt);}
.si{position:absolute;left:12px;color:var(--mt);font-size:12px;pointer-events:none;}
.sc{position:absolute;right:10px;color:var(--mt);font-size:12px;cursor:pointer;display:none;}
.sc:hover{color:var(--t1);}
.nb{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--b2);
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t2);font-size:14px;transition:border-color .18s,color .18s;flex-shrink:0;
}
.nb:hover{border-color:var(--spark);color:var(--spark);}
.upill{
  display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;
  border-radius:28px;border:1px solid var(--b2);background:var(--card2);
  cursor:pointer;transition:border-color .18s;text-decoration:none;
}
.upill:hover{border-color:var(--spark);}
.uav{
  width:30px;height:30px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:linear-gradient(135deg,var(--spark),var(--accent));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;border:2px solid var(--spark);
}
.uav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.ui{display:flex;flex-direction:column;line-height:1.2;}
.un{font-size:12px;font-weight:700;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.us{font-size:10px;color:var(--mt);font-weight:600;}

/* ─── TABS ─── */
.tabs-bar{
  position:fixed;top:var(--nh);left:0;right:0;z-index:200;height:var(--th);
  background:rgba(8,11,20,.94);border-bottom:1px solid var(--b2);
  display:flex;align-items:center;padding:0 20px;gap:5px;overflow-x:auto;
  backdrop-filter:blur(16px);contain:layout style;
}
[data-theme="light"] .tabs-bar{background:rgba(242,244,251,.95);}
.tabs-bar::-webkit-scrollbar{display:none;}
.tb{
  display:flex;align-items:center;gap:6px;padding:7px 18px;border-radius:24px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;color:var(--t2);transition:all .18s;border:1px solid transparent;white-space:nowrap;
}
.tb:hover{color:var(--t1);background:var(--card2);}
.tb.active{background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;box-shadow:0 4px 14px var(--sg);}
.tb i{font-size:12px;}
.tcnt{background:rgba(255,255,255,.18);border-radius:10px;padding:1px 7px;font-size:10px;font-weight:800;}
.tb:not(.active) .tcnt{background:var(--mt2);color:var(--t2);}

/* ─── MAIN ─── */
.main{padding-top:calc(var(--nh)+var(--th));min-height:100vh;}
.tab-pane{display:none;padding:20px 20px 60px;}
.tab-pane.active{display:block;}

/* ─── STATS ─── */
.stats-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.sc-card{
  background:var(--card);border:1px solid var(--b2);border-radius:var(--r);
  padding:11px 16px;display:flex;align-items:center;gap:11px;flex:1;min-width:110px;
}
.sic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.sic.tv{background:rgba(255,77,0,.12);color:var(--spark);}
.sic.rd{background:rgba(0,200,83,.12);color:var(--green);}
.sic.mv{background:rgba(245,200,66,.12);color:var(--gold);}
.sv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;line-height:1;}
.sl{font-size:11px;color:var(--mt);font-weight:600;margin-top:2px;}

/* ─── SEC HDR ─── */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sec-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;display:flex;align-items:center;gap:7px;}
.sec-title i{color:var(--spark);font-size:15px;}
.sec-cnt{font-size:12px;color:var(--mt);font-weight:600;}

/* ─── CATS ─── */
.cat-bar{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:16px;padding-bottom:3px;}
.cat-bar::-webkit-scrollbar{display:none;}
.cc{
  padding:5px 13px;border-radius:18px;font-size:11px;font-weight:700;
  border:1px solid var(--b2);background:var(--card2);color:var(--t2);
  cursor:pointer;transition:border-color .13s,color .13s,background .13s;white-space:nowrap;flex-shrink:0;
}
.cc:hover{border-color:var(--spark);color:var(--spark);}
.cc.active{background:var(--spark);border-color:var(--spark);color:#fff;}

/* ─── GRID ─── */
.ch-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;contain:content;
}
.mv-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
.ch-card{
  background:var(--card);border:1px solid var(--b2);border-radius:var(--r);
  overflow:hidden;cursor:pointer;
  will-change:transform;transform:translateZ(0);
  transition:border-color .2s,box-shadow .2s,transform .2s;
  position:relative;contain:layout style paint;
}
.ch-card:hover{border-color:rgba(255,77,0,.55);transform:translateY(-4px) translateZ(0);box-shadow:0 12px 32px rgba(255,77,0,.18);}
.cn{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);color:#fff;font-size:10px;font-weight:800;font-family:'Syne',sans-serif;padding:2px 7px;border-radius:6px;z-index:2;pointer-events:none;}
.ch-thumb{width:100%;aspect-ratio:16/9;background:var(--bg2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.ch-thumb.sq{aspect-ratio:1/1;background:var(--bg3);}
.ch-thumb.po{aspect-ratio:2/3;background:var(--bg3);}
.ch-thumb img{width:100%;height:100%;object-fit:cover;decoding:async;transition:transform .28s;}
.ch-card:hover .ch-thumb img{transform:scale(1.05);}
.ch-fb{width:60px;height:60px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--mt);}
.lb{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:800;letter-spacing:.05em;padding:2px 7px;border-radius:5px;z-index:2;pointer-events:none;animation:plb 2.2s infinite;}
@keyframes plb{0%,100%{opacity:1;}55%{opacity:.55;}}
.ch-hov{position:absolute;inset:0;background:rgba(0,0,0,.46);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;pointer-events:none;}
.ch-card:hover .ch-hov{opacity:1;}
.ch-hov i{font-size:42px;color:#fff;}
.ch-info{padding:9px 11px 11px;}
.ch-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;}
.ch-meta{display:flex;align-items:center;justify-content:space-between;gap:4px;}
.ch-tag{font-size:10px;font-weight:700;color:var(--mt);background:var(--card2);border-radius:5px;padding:2px 6px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;}
.ch-q{font-size:10px;font-weight:700;color:var(--accent);}
.sentinel{height:1px;width:100%;grid-column:1/-1;}
.load-more-btn{width:100%;margin-top:10px;padding:12px;border-radius:var(--r);border:1px solid var(--b2);background:var(--card2);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--t2);cursor:pointer;transition:all .18s;display:none;}
.load-more-btn:hover{border-color:var(--spark);color:var(--spark);}

/* ─── AUTH ─── */
.auth-ov{
  position:fixed;inset:0;z-index:600;
  background:rgba(8,11,20,.97);backdrop-filter:blur(22px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.auth-card{
  background:var(--card);border:1px solid rgba(255,77,0,.2);border-radius:20px;
  padding:36px 32px;width:100%;max-width:390px;
  box-shadow:0 40px 80px rgba(255,77,0,.1);
}
.auth-brand{text-align:center;margin-bottom:26px;}
.aico{width:70px;height:70px;border-radius:18px;margin:0 auto 11px;background:linear-gradient(135deg,var(--spark),var(--spark2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#fff;box-shadow:0 12px 36px rgba(255,77,0,.4);}
.abn{font-size:24px;font-weight:800;background:linear-gradient(135deg,var(--spark),var(--spark2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.abs{font-size:13px;color:var(--t2);margin-top:3px;font-weight:500;}
.auth-tabs{display:flex;background:var(--bg2);border-radius:11px;padding:4px;margin-bottom:20px;}
.at{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:700;text-align:center;cursor:pointer;color:var(--t2);transition:all .2s;}
.at.active{background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;box-shadow:0 4px 12px var(--sg);}
.af{margin-bottom:13px;}
.af label{display:block;font-size:11px;font-weight:700;color:var(--mt);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.af input{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--b2);border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--t1);outline:none;transition:border-color .2s,box-shadow .2s;}
.af input:focus{border-color:var(--spark);box-shadow:0 0 0 3px var(--sg);}
.af input::placeholder{color:var(--mt);}
.abtn{width:100%;padding:12px;border-radius:11px;border:none;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .18s,transform .18s;box-shadow:0 6px 18px var(--sg);}
.abtn:hover:not(:disabled){opacity:.9;transform:translateY(-1px);}
.abtn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
.aerr{font-size:12px;color:var(--red);text-align:center;margin-top:9px;min-height:15px;font-weight:600;}
.a-sep{display:flex;align-items:center;gap:9px;margin:14px 0;color:var(--mt);font-size:12px;}
.a-sep::before,.a-sep::after{content:'';flex:1;height:1px;background:var(--b2);}
.aanon{width:100%;padding:10px;border-radius:11px;border:1px solid var(--b2);background:transparent;color:var(--t2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;}
.aanon:hover{border-color:var(--accent);color:var(--accent);}

/* ─── PLAYER ─── */
.pl-ov{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.97);display:none;flex-direction:column;}
.pl-ov.open{display:flex;animation:fi .16s ease;}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
.pl-top{display:flex;align-items:center;gap:11px;padding:13px 18px;flex-shrink:0;background:rgba(0,0,0,.4);}
.pl-bk{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:15px;transition:all .18s;flex-shrink:0;}
.pl-bk:hover{background:rgba(255,77,0,.25);border-color:var(--spark);}
.pl-cn{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-cm{font-size:11px;color:rgba(255,255,255,.45);}
.ld{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--red);margin-right:5px;animation:plb 1.5s infinite;}
.pl-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 18px 12px;min-height:0;}
.pl-wrap{width:100%;max-width:960px;border-radius:14px;overflow:hidden;background:#000;position:relative;box-shadow:0 40px 80px rgba(0,0,0,.9);}
.pl-wrap video{width:100%;display:block;max-height:60vh;}
.pl-sp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);}
.q-row{display:flex;align-items:center;gap:5px;padding:9px 0 0;width:100%;max-width:960px;flex-wrap:wrap;}
.q-row label{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;}
.qb{padding:4px 13px;border-radius:18px;border:1px solid rgba(255,255,255,.14);background:transparent;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;cursor:pointer;transition:all .16s;font-family:'Nunito',sans-serif;}
.qb:hover{border-color:var(--spark);color:var(--spark);}
.qb.active{background:var(--spark);border-color:var(--spark);color:#fff;}
.nx-row{width:100%;max-width:960px;margin-top:10px;overflow-x:auto;}
.nx-row::-webkit-scrollbar{display:none;}
.nx-inner{display:flex;gap:9px;padding-bottom:2px;}
.nx-card{flex-shrink:0;width:130px;border-radius:9px;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:border-color .16s;}
.nx-card:hover{border-color:var(--spark);}
.nx-th{width:100%;aspect-ratio:16/9;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.nx-th img{width:100%;height:100%;object-fit:cover;}
.nx-nm{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);padding:5px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ─── SUB DIALOG ─── */
.sub-ov{position:fixed;inset:0;z-index:700;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:20px;}
.sub-ov.open{display:flex;animation:fi .18s ease;}
.sub-card{
  background:var(--card);border:1px solid rgba(255,77,0,.35);border-radius:20px;
  padding:38px 32px;max-width:440px;width:100%;text-align:center;
  box-shadow:0 40px 80px rgba(255,77,0,.14);
}
.sub-card .sub-emoji{font-size:54px;margin-bottom:14px;}
.sub-card h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:8px;}
.sub-card .sub-msg{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:10px;font-weight:500;}
.sub-status-badge{
  display:inline-block;padding:6px 16px;border-radius:20px;
  font-size:12px;font-weight:700;margin-bottom:20px;
  background:rgba(255,61,61,.12);color:var(--red);border:1px solid rgba(255,61,61,.25);
}
.sub-btns{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;}
.sbd{padding:10px 24px;border-radius:11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--b2);background:var(--card2);color:var(--t2);transition:all .18s;}
.sbd:hover{border-color:var(--mt);}
.sbu{padding:10px 24px;border-radius:11px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;background:linear-gradient(135deg,var(--spark),var(--spark2));color:#fff;box-shadow:0 6px 18px var(--sg);transition:all .18s;}
.sbu:hover{opacity:.9;transform:translateY(-1px);}

/* ─── SKELETON ─── */
.sk-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.sk-c{background:var(--card);border:1px solid var(--b2);border-radius:var(--r);overflow:hidden;}
.sk-t{width:100%;aspect-ratio:16/9;background:linear-gradient(90deg,var(--card2) 25%,var(--card3) 50%,var(--card2) 75%);background-size:300%;animation:sh 1.8s infinite linear;}
@keyframes sh{from{background-position:100%}to{background-position:-100%}}
.sk-b{padding:9px 11px;}
.sk-l{height:10px;border-radius:4px;background:var(--card3);margin-bottom:7px;animation:sh 1.8s infinite linear;}
.sk-l.s{width:50%;}
.empty{text-align:center;padding:60px 20px;color:var(--mt);grid-column:1/-1;}
.empty i{font-size:48px;margin-bottom:12px;display:block;}
.empty h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--t2);margin-bottom:7px;}
.empty p{font-size:13px;font-weight:500;}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);z-index:800;padding:10px 20px;border-radius:28px;font-size:13px;font-weight:700;background:var(--card3);border:1px solid var(--b2);box-shadow:0 8px 26px var(--sh);opacity:0;transition:all .26s cubic-bezier(.22,1,.36,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:rgba(0,230,118,.3);color:var(--green);}
.toast.err{border-color:rgba(255,61,61,.3);color:var(--red);}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .55s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg);}}

@media(max-width:580px){
  .nav-srch{display:none;}
  .ui{display:none;}
  .ch-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));}

/* ══════════════════════════════════════
   LOAD PLAYLIST
   Techniques:
   • fetch cache:force-cache  → instant on repeat visit
   • Web Worker parse         → never freezes main thread
   • PAGE_SIZE batch render   → DOM stays small
══════════════════════════════════════ */
async function loadM3U(){
  showSkeletons();
  try{
    const res = await fetch(M3U_URL,{cache:"force-cache"});
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const txt = await res.text();
    allChannels = await parseWorker(txt);
    filteredChs = allChannels.slice();
    toast(`✓ ${allChannels.length} channels loaded`,"ok");
  } catch(e){
    toast("Playlist error: "+e.message,"err");
    allChannels=[]; filteredChs=[];
  }
  renderAll();
}

/* Web Worker inline parse */
function parseWorker(txt){
  return new Promise(resolve=>{
    try{
      const blob=new Blob([`
        self.onmessage=function(e){
          const lines=e.data.split(/\\r?\\n/);
          const out=[]; let m=null;
          for(let i=0,L=lines.length;i<L;i++){
            const ln=lines[i].trim();
            if(!ln||ln==="#EXTM3U") continue;
            if(ln.startsWith("#EXTINF:")){
              const raw=ln.slice(8);
              const ap=raw.match(/^[^,]*/)[0];
              const a={};
              ap.replace(/(\\S+?)="([^"]*)"/g,(_,k,v)=>{a[k.toLowerCase()]=v;});
              const nm=raw.match(/,(.+)$/);
              m={name:a["tvg-name"]||(nm?nm[1].trim():"Unknown"),logo:a["tvg-logo"]||"",group:(a["group-title"]||"General").split(";")[0].trim(),url:""};
            } else if(m&&ln&&!ln.startsWith("#")){m.url=ln;out.push(m);m=null;}
          }
          self.postMessage(out);
        };
      `],{type:"application/javascript"});
      const w=new Worker(URL.createObjectURL(blob));
      w.onmessage=e=>{w.terminate();resolve(e.data);};
      w.onerror=()=>{w.terminate();resolve(parseSync(txt));};
      w.postMessage(txt);
    } catch(e){ resolve(parseSync(txt)); }
  });
}
function parseSync(txt){
  const lines=txt.split(/\r?\n/); const out=[]; let m=null;
  for(let i=0,L=lines.length;i<L;i++){
    const ln=lines[i].trim();
    if(!ln||ln==="#EXTM3U") continue;
    if(ln.startsWith("#EXTINF:")){
      const raw=ln.slice(8); const ap=raw.match(/^[^,]*/)[0]; const a={};
      ap.replace(/(\S+?)="([^"]*)"/g,(_,k,v)=>{a[k.toLowerCase()]=v;});
      const nm=raw.match(/,(.+)$/);
      m={name:a["tvg-name"]||(nm?nm[1].trim():"Unknown"),logo:a["tvg-logo"]||"",group:(a["group-title"]||"General").split(";")[0].trim(),url:""};
    } else if(m&&ln&&!ln.startsWith("#")){m.url=ln;out.push(m);m=null;}
  }
  return out;
}

/* ── Classify ── */
const RD=/\b(radio|fm\b|am\b|music radio|talk radio|station)\b/i;
const MV=/\b(movie|movies|film|cinema|vod|drama|series|documentary)\b/i;
function isRad(c){return RD.test(c.group)||RD.test(c.name);}
function isMov(c){return !isRad(c)&&MV.test(c.group);}
function isTV(c){return !isRad(c)&&!isMov(c);}

/* ══════════════════════════════════════
   RENDER ALL
══════════════════════════════════════ */
function renderAll(){
  const tvA=allChannels.filter(isTV);

  const mvA=allChannels.filter(isMov);

    stat("tv","fa-tv",tvA.length,"TV Channels")+
    stat("rd","fa-radio",rdA.length,"Radio Stations")+
    stat("mv","fa-film",mvA.length,"Movies / VOD");

  buildCats("tv",    filteredChs.filter(isTV),  tvA);
  buildCats("radio", filteredChs.filter(isRad), rdA);
  buildCats("movies",filteredChs.filter(isMov), mvA);

  pageIdx={tv:0,radio:0,movies:0};
  renderBatch("tv",    filteredChs.filter(isTV));
  renderBatch("radio", filteredChs.filter(isRad));
  renderBatch("movies",filteredChs.filter(isMov));
}
function stat(cls,ico,val,lbl){
  return `<div class="sc-card"><div class="sic ${cls}"><i class="fa ${ico}"></i></div><div><div class="sv">${val}</div><div class="sl">${lbl}</div></div></div>`;

/* ── Categories ── */
function buildCats(tab,list,allList){
  const gs=[...new Set(allList.map(c=>c.group))].sort();
  const cur=catSel[tab];
  let h=`<div class="cc${cur==="All"?" active":""}" onclick="setCat('${tab}','All')">All (${allList.length})</div>`;
  gs.forEach(g=>{
    const cn=allList.filter(c=>c.group===g).length;
    h+=`<div class="cc${cur===g?" active":""}" onclick="setCat('${tab}','${g.replace(/'/g,"\\'")}')">
      ${xe(g)}<small style="opacity:.55;margin-left:3px;">${cn}</small></div>`;
  });
  document.getElementById(`${tab}-cats`).innerHTML=h;
}
window.setCat=function(tab,cat){catSel[tab]=cat;renderAll();};

/* ══════════════════════════════════════
   BATCH RENDER + IntersectionObserver
══════════════════════════════════════ */
function getList(tab){
  const fn=tab==="radio"?isRad:tab==="movies"?isMov:isTV;
  let l=filteredChs.filter(fn);
  if(catSel[tab]!=="All") l=l.filter(c=>c.group===catSel[tab]);
  return l;
}
function renderBatch(tab,list){
  if(!list) list=getList(tab);
  const grid=document.getElementById(`${tab}-grid`);
  const mBtn=document.getElementById(`${tab}-more`);
  const type=tab==="radio"?"radio":tab==="movies"?"movies":"tv";
  const slice=list.slice(0,(pageIdx[tab]+1)*PAGE_SIZE);

  document.getElementById(`${tab}-cnt`).textContent=
    `${list.length} ${type==="radio"?"station":type==="movies"?"title":"channel"}${list.length!==1?"s":""}`;

  if(!list.length){
    grid.innerHTML=`<div class="empty"><i class="fa fa-satellite-dish"></i><h3>Nothing found</h3><p>Try another category or search.</p></div>`;
    mBtn.style.display="none"; return;
  }
  let html="";
  slice.forEach((c,i)=>{html+=card(c,i+1,type);});
  grid.innerHTML=html;

  const hasMore=slice.length<list.length;
  mBtn.style.display=hasMore?"block":"none";
  if(hasMore&&"IntersectionObserver" in window){
    mBtn.style.display="none";
    attachSentinel(tab,list,grid);
  }
}
function attachSentinel(tab,list,grid){
  const old=grid.querySelector(".sentinel"); if(old) old.remove();
  const s=document.createElement("div"); s.className="sentinel"; grid.appendChild(s);
  const obs=new IntersectionObserver(entries=>{
    if(!entries[0].isIntersecting) return;
    obs.disconnect(); s.remove();
    const next=(pageIdx[tab]+1)*PAGE_SIZE;
    if(next>=list.length) return;
    pageIdx[tab]++;
    const type=tab==="radio"?"radio":tab==="movies"?"movies":"tv";
    const newSlice=list.slice(pageIdx[tab]*PAGE_SIZE,(pageIdx[tab]+1)*PAGE_SIZE);
    const offset=pageIdx[tab]*PAGE_SIZE;
    let html=""; newSlice.forEach((c,i)=>{html+=card(c,offset+i+1,type);});
    grid.insertAdjacentHTML("beforeend",html);
    if((pageIdx[tab]+1)*PAGE_SIZE<list.length) attachSentinel(tab,list,grid);
  },{rootMargin:"300px"});
  obs.observe(s);
}
window.loadMore=function(tab){pageIdx[tab]++;renderBatch(tab,getList(tab));};

/* ── Card builder ── */
function card(c,num,type){
  const isr=type==="radio",ism=type==="movies";
  const tc=isr?"sq":ism?"po":"";
  const q=pickQ(c.name);
  const logo=c.logo
    ?`<img data-src="${xe(c.logo)}" src="" alt="${xe(c.name)}" loading="lazy" decoding="async"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="ch-fb" style="display:none;"><i class="fa fa-${isr?"radio":ism?"film":"tv"}"></i></div>`
    :`<div class="ch-fb"><i class="fa fa-${isr?"radio":ism?"film":"tv"}"></i></div>`;
  return `<div class="ch-card" onclick="playCh('${xe(c.url)}','${xe(c.name)}','${xe(c.group)}')">
    <div class="ch-thumb${tc?" "+tc:""}">
      ${logo}
      <div class="cn">#${num}</div>
      ${!ism?'<div class="lb">LIVE</div>':''}
      <div class="ch-hov"><i class="fa fa-circle-play"></i></div>
    </div>
    <div class="ch-info">
      <div class="ch-name" title="${xe(c.name)}">${xe(c.name)}</div>
      <div class="ch-meta">
        <span class="ch-tag">${xe(c.group)}</span>
        ${q?`<span class="ch-q">${q}</span>`:""}
      </div>
    </div>
  </div>`;
}
function pickQ(n){const m=n.match(/(\d{3,4}p|4K|HD|UHD|SD)/i);return m?m[1]:"";}

/* Lazy image loading via IntersectionObserver */
const imgObs="IntersectionObserver" in window
  ?new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(!e.isIntersecting) return;
        const img=e.target;
        if(img.dataset.src){img.src=img.dataset.src;delete img.dataset.src;}
        imgObs.unobserve(img);
      });
    },{rootMargin:"400px"})
  :null;
const mutObs=new MutationObserver(muts=>{
  if(!imgObs) return;
  muts.forEach(m=>m.addedNodes.forEach(n=>{
    if(n.nodeType!==1) return;
    n.querySelectorAll("img[data-src]").forEach(img=>imgObs.observe(img));
  }));
});
["tv-grid","radio-grid","movies-grid"].forEach(id=>{
  const el=document.getElementById(id);
  if(el) mutObs.observe(el,{childList:true,subtree:true});
});

/* ── Tab switch ── */
window.switchTab=function(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tb").forEach(t=>t.classList.remove("active")); el.classList.add("active");
  document.querySelectorAll(".tab-pane").forEach(p=>p.classList.remove("active"));
  document.getElementById(`pane-${tab}`).classList.add("active");
};

/* ── Search (debounced) ── */
window.onSearch=function(q){
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const v=q.toLowerCase().trim();
    document.getElementById("sc").style.display=v?"block":"none";
    filteredChs=v?allChannels.filter(c=>c.name.toLowerCase().includes(v)||c.group.toLowerCase().includes(v)):allChannels.slice();
    if(v) catSel={tv:"All",radio:"All",movies:"All"};
    renderAll();
  },200);
};
window.clearSrch=function(){
  document.getElementById("srch").value="";
  document.getElementById("sc").style.display="none";
  filteredChs=allChannels.slice(); renderAll();
};

/* ══════════════════════════════════════
   PLAYER
   sub_status check: always read live from DB
   so if admin flips it, user gets access immediately
══════════════════════════════════════ */
window.playCh=async function(url,name,group){
  if(!currentUser){toast("Please sign in first","err");return;}

  /* Guest = can watch freely */
  if(currentUser.isAnonymous){ openPlayer(url,name,group); return; }

  /* Always re-check sub_status live from DB before playing */
  try{
    const snap=await _db.ref(`users/${currentUser.uid}/subscription/sub_status`).once("value");
    const raw=snap.val();
    /* Accept "true" (string) or true (boolean) */
    userSubStatus = raw===true||raw==="true";
  } catch(e){ userSubStatus=false; }

  if(userSubStatus){
    openPlayer(url,name,group);
  } else {
    /* Show subscription dialog with user's message if set */
    const msg = userRecord?.personal?.msg_for_user || "Your subscription is not active. Upgrade your plan to watch premium channels.";
    document.getElementById("sub-msg").textContent=msg;
    document.getElementById("sub-badge").textContent="Status: Inactive — Please Subscribe";
    document.getElementById("sub-ov").classList.add("open");
  }
};

function openPlayer(url,name,group){
  if(!url){toast("No stream URL","err");return;}
  document.getElementById("pl-name").textContent=name;
  document.getElementById("pl-grp").textContent=group||"Live";
  document.getElementById("pl-ov").classList.add("open");
  document.body.style.overflow="hidden";
  startStream(url);
  buildNext(name);
}

function startStream(url){
  const vid=document.getElementById("vid");
  vid.src=""; vid.load();
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  document.getElementById("pl-sp").style.display="flex";
  document.getElementById("q-row").innerHTML="";

  const isHLS=/\.m3u8/i.test(url)||/\/hls\//i.test(url)||/chunklist/i.test(url);
  if(isHLS&&Hls.isSupported()){
    hlsInst=new Hls({
      enableWorker:true,lowLatencyMode:true,
      maxBufferLength:24,maxMaxBufferLength:48,
      startLevel:-1,
      fragLoadingTimeOut:12000,manifestLoadingTimeOut:12000,levelLoadingTimeOut:10000
    });
    hlsInst.loadSource(url);
    hlsInst.attachMedia(vid);
    hlsInst.on(Hls.Events.MANIFEST_PARSED,(_,d)=>{
      document.getElementById("pl-sp").style.display="none";
      vid.play().catch(()=>{});
      buildQBar(d.levels);
    });
    hlsInst.on(Hls.Events.ERROR,(_,d)=>{
      if(d.fatal){
        document.getElementById("pl-sp").style.display="none";
        toast("Stream error — recovering…","err");
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR) hlsInst.startLoad();
        else if(d.type===Hls.ErrorTypes.MEDIA_ERROR) hlsInst.recoverMediaError();
      }
    });
  } else if(vid.canPlayType("application/vnd.apple.mpegurl")){
    vid.src=url; vid.play().finally(()=>document.getElementById("pl-sp").style.display="none");
  } else {
    vid.src=url; vid.play().finally(()=>document.getElementById("pl-sp").style.display="none");
  }
}

function buildQBar(levels){
  if(!levels||levels.length<2) return;
  let h=`<label>Quality:</label><button class="qb active" onclick="setQ(-1,this)">Auto</button>`;
  levels.forEach((l,i)=>{h+=`<button class="qb" onclick="setQ(${i},this)">${l.height?l.height+"p":"L"+(i+1)}</button>`;});
  document.getElementById("q-row").innerHTML=h;
}
window.setQ=function(lv,btn){
  if(hlsInst)hlsInst.currentLevel=lv;
  document.querySelectorAll(".qb").forEach(b=>b.classList.remove("active")); btn.classList.add("active");
};
function buildNext(curName){
  const fn=currentTab==="radio"?isRad:currentTab==="movies"?isMov:isTV;
  const others=allChannels.filter(c=>fn(c)&&c.name!==curName).slice(0,14);
  document.getElementById("nx-inner").innerHTML=others.map(c=>`
    <div class="nx-card" onclick="playCh('${xe(c.url)}','${xe(c.name)}','${xe(c.group)}')">
      <div class="nx-th">${c.logo?`<img src="${xe(c.logo)}" alt="" loading="lazy" decoding="async" onerror="this.style.display='none'"/>`:
        `<i class="fa fa-tv" style="color:rgba(255,255,255,.3);"></i>`}</div>
      <div class="nx-nm">${xe(c.name)}</div>
    </div>`).join("");
}
window.closePl=function(){
  const vid=document.getElementById("vid");
  vid.pause(); vid.src="";
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  document.getElementById("pl-ov").classList.remove("open");
  document.body.style.overflow="";
  document.getElementById("q-row").innerHTML="";
};
window.togglePiP=function(){
  const v=document.getElementById("vid");
  if(document.pictureInPictureElement) document.exitPictureInPicture();
  else v.requestPictureInPicture&&v.requestPictureInPicture();
};
window.toggleFS=function(){
  const el=document.getElementById("pl-ov");
  if(!document.fullscreenElement) el.requestFullscreen&&el.requestFullscreen();
  else document.exitFullscreen&&document.exitFullscreen();
};

/* ─── Subscription dialog ─── */
window.closeSub=function(){document.getElementById("sub-ov").classList.remove("open");};
document.getElementById("sub-ov").addEventListener("click",function(e){if(e.target===this)closeSub();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closePl();});

/* ─── Skeletons ─── */
function showSkeletons(){
  const sk=Array(12).fill(`<div class="sk-c"><div class="sk-t"></div><div class="sk-b"><div class="sk-l"></div><div class="sk-l s"></div></div></div>`).join("");
  ["tv","radio","movies"].forEach(t=>document.getElementById(`${t}-grid`).innerHTML=`<div class="sk-g">${sk}</div>`);
}

/* ─── Toast ─── */
let _tt;
window.toast=function(msg,type){
  const el=document.getElementById("toast");
  el.className=`toast ${type||"info"} show`;
  el.textContent=msg;
  clearTimeout(_tt); _tt=setTimeout(()=>{el.className="toast";},3500);
};

/* ─── Escape helper ─── */
function xe(s){const d=document.createElement("div");d.textContent=String(s||"");return d.innerHTML;}
</script>
